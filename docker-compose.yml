# ──────────────────────────────────────────────
# NaijaReview Intelligence — Docker Compose
# ──────────────────────────────────────────────
# Usage:
#   docker compose up              → API + ChromaDB + Redis
#   docker compose --profile eval up → Above + eval runner
# ──────────────────────────────────────────────

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/data/chroma
    volumes:
      - chroma-data:/data/chroma
      - ./data:/app/data
      - ./results:/app/results
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Eval profile (optional) ────────────────
  eval-runner:
    build: .
    profiles: ["eval"]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/data/chroma
    volumes:
      - chroma-data:/data/chroma
      - ./data:/app/data
      - ./results:/app/results
    depends_on:
      - api
    command: ["python", "-m", "naijareview.eval.harness"]

volumes:
  chroma-data:
  redis-data:
